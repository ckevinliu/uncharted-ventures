<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Uncharted / Ventures — Logo Export</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 80px;
      font-family: 'Inter', sans-serif;
      color: #999;
    }

    .logo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
    }

    .preview {
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- 1. Square icon (LinkedIn profile pic, app icon) -->
  <div class="logo-row">
    <div class="label">Square Icon — 400x400</div>
    <div class="preview">
      <svg id="icon-square" width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <rect width="400" height="400" rx="32" fill="#0a0a0a"/>
        <text x="90" y="265" font-family="'Playfair Display',Georgia,serif" font-size="200" font-weight="400" fill="#e8e6e3">U</text>
        <line x1="268" y1="90" x2="220" y2="310" stroke="#9c3848" stroke-width="12" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- 2. Wordmark (LinkedIn banner, website) -->
  <div class="logo-row">
    <div class="label">Wordmark — Dark Background</div>
    <div class="preview">
      <svg id="wordmark-dark" width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
        <rect width="800" height="120" fill="#0a0a0a"/>
        <text x="40" y="82" font-family="'Inter',-apple-system,sans-serif" font-size="28" font-weight="500" letter-spacing="3" fill="#e8e6e3">UNCHARTED</text>
        <text x="352" y="82" font-family="'Playfair Display',Georgia,serif" font-size="32" font-weight="300" fill="#9c3848">/</text>
        <text x="385" y="82" font-family="'Inter',-apple-system,sans-serif" font-size="28" font-weight="500" letter-spacing="3" fill="#e8e6e3">VENTURES</text>
      </svg>
    </div>
  </div>

  <!-- 3. Wordmark on light/white -->
  <div class="logo-row">
    <div class="label">Wordmark — Light Background</div>
    <div class="preview">
      <svg id="wordmark-light" width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
        <rect width="800" height="120" fill="#f5f5f3"/>
        <text x="40" y="82" font-family="'Inter',-apple-system,sans-serif" font-size="28" font-weight="500" letter-spacing="3" fill="#0a0a0a">UNCHARTED</text>
        <text x="352" y="82" font-family="'Playfair Display',Georgia,serif" font-size="32" font-weight="300" fill="#9c3848">/</text>
        <text x="385" y="82" font-family="'Inter',-apple-system,sans-serif" font-size="28" font-weight="500" letter-spacing="3" fill="#0a0a0a">VENTURES</text>
      </svg>
    </div>
  </div>

  <!-- 4. LinkedIn banner (1584x396) -->
  <div class="logo-row">
    <div class="label">LinkedIn Banner — 1584x396 (scaled to 50%)</div>
    <div class="preview">
      <svg id="linkedin-banner" width="792" height="198" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
        <rect width="1584" height="396" fill="#0a0a0a"/>
        <!-- subtle accent glow -->
        <ellipse cx="1200" cy="198" rx="400" ry="250" fill="url(#glow)"/>
        <defs>
          <radialGradient id="glow">
            <stop offset="0%" stop-color="#9c3848" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#9c3848" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- wordmark -->
        <text x="120" y="220" font-family="'Inter',-apple-system,sans-serif" font-size="42" font-weight="500" letter-spacing="5" fill="#e8e6e3">UNCHARTED</text>
        <text x="590" y="220" font-family="'Playfair Display',Georgia,serif" font-size="48" font-weight="300" fill="#9c3848">/</text>
        <text x="630" y="220" font-family="'Inter',-apple-system,sans-serif" font-size="42" font-weight="500" letter-spacing="5" fill="#e8e6e3">VENTURES</text>
        <!-- tagline -->
        <text x="120" y="270" font-family="'Inter',-apple-system,sans-serif" font-size="16" font-weight="300" letter-spacing="3" fill="rgba(255,255,255,0.3)">PRE-SEED &middot; SEED &middot; SERIES A</text>
        <!-- thin line -->
        <line x1="120" y1="290" x2="220" y2="290" stroke="#9c3848" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <div style="margin-top: 40px; font-size: 12px; color: #555; max-width: 500px; text-align: center; line-height: 1.6;">
    Right-click any logo above → "Save Image As" to export as SVG.<br>
    Or take a screenshot for quick PNG use.
  </div>

</body>
</html>
